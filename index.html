<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom MC Launcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">

    <section class="flex flex-col items-center justify-center min-h-screen text-center px-4">
        <h1 class="text-5xl font-extrabold tracking-tight sm:text-6xl bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent">
            The Ultimate Custom MC Launcher
        </h1>
        <p class="mt-6 text-lg leading-8 text-gray-300 max-w-2xl">
            A lightweight, high-performance, open-source Minecraft Java Edition launcher built natively from scratch. Zero bloat. Full control.
        </p>
        <div class="mt-10 flex items-center justify-center gap-x-6">
            <a id="download-btn" href="#" class="rounded-md bg-green-500 px-6 py-3 text-lg font-semibold text-white shadow-sm hover:bg-green-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-green-500 transition-all">
                Fetching Latest Release...
            </a>
        </div>
    </section>

    <script src="app.js"></script>

</html>
